version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nexlogix-nginx
    ports:
      - "8081:81"
    volumes:
      - ../backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel-app
    networks:
      - mysql-world-server_default

  laravel-app:
    build:
      context: ../backend
      dockerfile: ../docker/php/Dockerfile
    container_name: nexlogix-laravel
    volumes:
      - ../backend:/var/www/html
    networks:
      - mysql-world-server_default

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/node/Dockerfile
    container_name: nexlogix-frontend
    ports:
      - "3000:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - mysql-world-server_default

networks:
  mysql-world-server_default:
    external: true

